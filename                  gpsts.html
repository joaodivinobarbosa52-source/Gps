<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgroSystem Pro - Satélite</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #eceff1; }
        #map { height: 65vh; width: 100%; border-bottom: 3px solid #2e7d32; }
        
        .panel { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 10px; }
        
        label { font-size: 11px; font-weight: bold; color: #333; text-transform: uppercase; }
        select, input { 
            flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; 
        }

        .btn {
            padding: 15px; border: none; border-radius: 8px; font-weight: bold;
            text-transform: uppercase; cursor: pointer; color: white;
        }
        .btn-update { background: #2e7d32; flex: 2; }
        .btn-gps { background: #1976d2; flex: 1; }

        .legend-box {
            background: white; padding: 8px; border-radius: 4px; line-height: 1.4;
            font-size: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .color-box { width: 14px; height: 14px; display: inline-block; margin-right: 5px; vertical-align: middle; border: 1px solid #999; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
    <div class="row">
        <div style="flex:1">
            <label>Visualização</label>
            <select id="layerSelect">
                <option value="NDVI">NDVI (Vigor Vegetativo)</option>
                <option value="TRUE-COLOR">Cor Real (Visual)</option>
                <option value="MOISTURE-INDEX">Índice de Umidade</option>
            </select>
        </div>
        <div style="flex:1">
            <label>Data da Imagem</label>
            <input type="date" id="dateSelect" value="2026-03-24">
        </div>
    </div>

    <div class="row">
        <button class="btn btn-gps" onclick="findMe()">📍 GPS</button>
        <button class="btn btn-update" onclick="updateSatellite()">Atualizar Satélite</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Configuração inicial (Rio Verde - GO)
    var map = L.map('map').setView([-17.79, -50.92], 13);
    var instanceId = "39c33ffe-a15f-4ca4-b0a0-e5b301ca8d65";
    var satelliteLayer;

    // Camada Google Híbrida
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
    }).addTo(map);

    // Legenda Customizada
    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function () {
        var div = L.DomUtil.create('div', 'legend-box');
        div.innerHTML = '<b>Legenda NDVI</b><br>' +
            '<span class="color-box" style="background:#006400"></span> Alto (>0.8)<br>' +
            '<span class="color-box" style="background:#ccffcc"></span> Médio (0.4)<br>' +
            '<span class="color-box" style="background:#ffff00"></span> Solo/Estresse';
        return div;
    };

    function updateSatellite() {
        var layer = document.getElementById('layerSelect').value;
        var date = document.getElementById('dateSelect').value;

        if (satelliteLayer) map.removeLayer(satelliteLayer);

        satelliteLayer = L.tileLayer.wms("https://services.sentinel-hub.com/ogc/wms/" + instanceId, {
            layers: layer,
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            time: date + '/' + date,
            maxcc: 30 // Limite de 30% de nuvens
        }).addTo(map);

        if (layer === "NDVI") legend.addTo(map); else legend.remove();
    }

    function findMe() {
        map.locate({setView: true, maxZoom: 16});
    }

    map.on('locationfound', function(e) {
        L.marker(e.latlng).addTo(map).bindPopup("Você está aqui").openPopup();
    });

    // Iniciar com uma imagem
    updateSatellite();
</script>

</body>
</html>
