<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lista de Compras</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2d6a4f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Compras">
    <link rel="apple-touch-icon" id="appleIcon" href="">

    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fdf6ec;
            --paper: #fffef9;
            --green: #2d6a4f;
            --green-light: #52b788;
            --green-pale: #d8f3dc;
            --orange: #e76f51;
            --ink: #1a1a2e;
            --muted: #8a8a9a;
            --border: #e8e2d5;
            --shadow: 0 4px 24px rgba(45,106,79,0.10);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--cream);
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: max(env(safe-area-inset-top, 24px), 24px) 16px max(env(safe-area-inset-bottom, 40px), 40px);
        }

        body::before {
            content: '';
            position: fixed; top: -120px; right: -120px;
            width: 400px; height: 400px;
            background: radial-gradient(circle, #d8f3dc 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: '';
            position: fixed; bottom: -100px; left: -80px;
            width: 300px; height: 300px;
            background: radial-gradient(circle, #fde8d8 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* ── Banner instalação ── */
        #installBanner {
            display: none;
            width: 100%; max-width: 480px;
            background: var(--green); color: white;
            border-radius: 16px; padding: 14px 18px;
            margin-bottom: 14px;
            align-items: center; gap: 12px;
            position: relative; z-index: 10;
            animation: slideIn 0.4s cubic-bezier(.34,1.3,.64,1) both;
        }
        #installBanner.visible { display: flex; }
        #installBanner .banner-icon { font-size: 1.6rem; flex-shrink: 0; }
        #installBanner .banner-text { flex: 1; }
        #installBanner .banner-text strong { display: block; font-size: 0.95rem; }
        #installBanner .banner-text span  { font-size: 0.78rem; opacity: 0.85; }
        #installBanner .btn-install {
            background: white; color: var(--green);
            border: none; padding: 8px 16px;
            border-radius: 10px; font-family: 'DM Sans', sans-serif;
            font-weight: 700; font-size: 0.85rem; cursor: pointer;
            flex-shrink: 0; transition: opacity 0.15s;
        }
        #installBanner .btn-install:hover { opacity: 0.85; }
        #installBanner .btn-dismiss {
            background: none; border: none; color: white;
            font-size: 1.2rem; cursor: pointer; opacity: 0.7;
            flex-shrink: 0; padding: 0 2px;
        }

        /* ── Container ── */
        .container {
            background: var(--paper);
            width: 100%; max-width: 480px;
            border-radius: 24px;
            box-shadow: var(--shadow), 0 1px 0 rgba(255,255,255,0.9) inset;
            padding: 32px 28px 36px;
            position: relative; z-index: 1;
            border: 1px solid var(--border);
        }

        .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
        .header-text h1 {
            font-family: 'Fraunces', serif; font-size: 2rem;
            font-weight: 900; color: var(--ink); line-height: 1.1;
        }
        .header-text h1 span { color: var(--green); }
        .header-text p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
        .badge-count {
            background: var(--green); color: white;
            font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 700;
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
        }
        .badge-count.bump { transform: scale(1.25); }

        .divider { height: 1px; background: linear-gradient(90deg, var(--green-pale), transparent); margin: 0 0 24px; }

        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .input-wrap { position: relative; flex: 1; }
        .input-wrap label {
            display: block; font-size: 0.72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.07em;
            color: var(--muted); margin-bottom: 5px;
        }
        input[type="text"], input[type="number"] {
            width: 100%; padding: 13px 14px;
            border: 2px solid var(--border); border-radius: 12px;
            font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
            background: var(--cream); color: var(--ink);
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: var(--green-light); background: white;
            box-shadow: 0 0 0 4px rgba(82,183,136,0.12);
        }
        input[type="number"] { width: 90px; text-align: center; }

        .btn-add {
            width: 100%; background: var(--green); color: white;
            border: none; padding: 15px; border-radius: 14px;
            font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 8px;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-add:hover { background: #245c43; }
        .btn-add:active { transform: scale(0.97); }

        .list-header {
            display: flex; align-items: center; gap: 10px; margin: 24px 0 14px;
        }
        .list-header span {
            font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--muted); white-space: nowrap;
        }
        .list-header::before, .list-header::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        ul { list-style: none; }

        li {
            background: white; border: 1.5px solid var(--border);
            margin-bottom: 8px; padding: 14px 14px 14px 16px;
            border-radius: 14px; display: flex; align-items: center; gap: 12px;
            animation: slideIn 0.3s cubic-bezier(.34,1.3,.64,1) both;
            transition: opacity 0.25s, transform 0.25s;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        li.removing { opacity: 0; transform: scale(0.93) translateX(20px); }

        .check-btn {
            width: 26px; height: 26px; border-radius: 50%;
            border: 2px solid var(--green-light); background: transparent;
            cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, border-color 0.2s; padding: 0;
        }
        .check-btn svg { display: none; }
        .comprado .check-btn { background: var(--green-light); border-color: var(--green-light); }
        .comprado .check-btn svg { display: block; }

        .item-info { flex: 1; cursor: pointer; min-width: 0; }
        .item-nome {
            font-size: 0.97rem; font-weight: 500; color: var(--ink);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: color 0.2s;
        }
        .item-qtd { font-size: 0.78rem; color: var(--green); font-weight: 600; margin-top: 2px; }
        .comprado .item-nome { text-decoration: line-through; color: var(--muted); }
        .comprado .item-qtd { color: var(--muted); }
        .comprado { opacity: 0.65; }

        .btn-del {
            background: transparent; border: none; color: var(--muted);
            cursor: pointer; padding: 6px; border-radius: 8px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, color 0.15s;
        }
        .btn-del:hover { background: #fde8e4; color: var(--orange); }

        .empty { text-align: center; padding: 32px 0 16px; color: var(--muted); }
        .empty-icon { font-size: 2.5rem; margin-bottom: 8px; }
        .empty p { font-size: 0.9rem; }

        .footer-actions { margin-top: 20px; display: flex; justify-content: flex-end; }
        .btn-clear {
            background: none; border: none; font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem; color: var(--muted); cursor: pointer;
            padding: 4px 8px; border-radius: 6px; transition: color 0.15s, background 0.15s;
        }
        .btn-clear:hover { color: var(--orange); background: #fde8e4; }

        /* ── Toast ── */
        #toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--ink); color: white;
            padding: 10px 22px; border-radius: 50px;
            font-size: 0.85rem; font-weight: 500;
            z-index: 100; white-space: nowrap;
            transition: transform 0.35s cubic-bezier(.34,1.3,.64,1);
            pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="installBanner">
    <div class="banner-icon">📲</div>
    <div class="banner-text">
        <strong>Instalar como aplicativo</strong>
        <span>Funciona offline, como app nativo</span>
    </div>
    <button class="btn-install" id="btnInstall">Instalar</button>
    <button class="btn-dismiss" id="btnDismiss">✕</button>
</div>

<div class="container">
    <div class="header">
        <div class="header-text">
            <h1>Lista de<br><span>Compras</span></h1>
            <p id="subtitulo">Adicione os itens abaixo</p>
        </div>
        <div class="badge-count" id="badgeCount">0</div>
    </div>

    <div class="divider"></div>

    <div class="form-row">
        <div class="input-wrap">
            <label for="produtoInput">Produto</label>
            <input type="text" id="produtoInput" list="bancoProdutos" placeholder="Ex: Arroz, Café...">
            <datalist id="bancoProdutos"></datalist>
        </div>
        <div class="input-wrap" style="flex:0">
            <label for="qtdInput">Qtd</label>
            <input type="number" id="qtdInput" placeholder="1" min="1">
        </div>
    </div>

    <button class="btn-add" onclick="adicionarItem()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar à lista
    </button>

    <div class="list-header"><span>Itens</span></div>

    <ul id="listaUl">
        <li class="empty" id="emptyState">
            <div class="empty-icon">🛒</div>
            <p>Sua lista está vazia.<br>Comece adicionando um produto!</p>
        </li>
    </ul>

    <div class="footer-actions">
        <button class="btn-clear" onclick="limparComprados()">Remover comprados</button>
    </div>
</div>

<div id="toast"></div>

<script>
    // ── Sugestões ──────────────────────────────────────────
    const produtosSugestao = [
        "Sal Refinado","Sal Grosso","Farinha de Trigo","Farinha de Mandioca","Farinha de Milho",
        "Farinha de Rosca","Fubá","Leite Condensado","Creme de Leite","Leite Integral",
        "Açúcar Refinado","Açúcar Mascavo","Arroz","Feijão","Macarrão","Molho de Tomate",
        "Óleo de Soja","Azeite","Café","Achocolatado","Milho de Pipoca","Ervilha",
        "Sardinha em Lata","Atum","Maionese","Ketchup","Mostarda","Vinagre",
        "Detergente","Sabão em Pó","Amaciante","Água Sanitária","Desinfetante",
        "Sabonete","Shampoo","Creme Dental","Papel Higiênico","Esponja",
        "Bombril","Saco de Lixo","Manteiga","Margarina","Ovos","Queijo","Presunto"
    ];

    const datalist     = document.getElementById('bancoProdutos');
    const produtoInput = document.getElementById('produtoInput');
    const qtdInput     = document.getElementById('qtdInput');
    const listaUl      = document.getElementById('listaUl');
    const badgeCount   = document.getElementById('badgeCount');
    const emptyState   = document.getElementById('emptyState');
    const subtitulo    = document.getElementById('subtitulo');
    const toastEl      = document.getElementById('toast');

    produtosSugestao.sort().forEach(prod => {
        const opt = document.createElement('option');
        opt.value = prod;
        datalist.appendChild(opt);
    });

    // ── Toast ──────────────────────────────────────────────
    let toastTimer;
    function mostrarToast(msg, dur = 3000) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), dur);
    }

    // ── LocalStorage ───────────────────────────────────────
    const LS_KEY = 'lista_compras_v1';

    function salvarLista() {
        const itens = [];
        listaUl.querySelectorAll('li:not(.empty)').forEach(li => {
            const qtdEl = li.querySelector('.item-qtd');
            itens.push({
                nome: li.querySelector('.item-nome').textContent,
                qtd:  qtdEl ? qtdEl.dataset.qtd : null,
                comprado: li.classList.contains('comprado')
            });
        });
        localStorage.setItem(LS_KEY, JSON.stringify(itens));
    }

    function carregarLista() {
        try {
            const salvo = localStorage.getItem(LS_KEY);
            if (!salvo) return;
            JSON.parse(salvo).reverse().forEach(i => criarLi(i.nome, i.qtd, i.comprado));
        } catch(e) { localStorage.removeItem(LS_KEY); }
    }

    // ── Criar item ─────────────────────────────────────────
    function criarLi(nome, qtd, comprado = false) {
        const li = document.createElement('li');
        if (comprado) li.classList.add('comprado');
        const n = qtd ? parseInt(qtd) : null;
        li.innerHTML = `
            <button class="check-btn" onclick="toggleComprado(this)" title="Marcar como comprado">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <div class="item-info" onclick="toggleComprado(this.previousElementSibling)">
                <div class="item-nome">${nome}</div>
                ${n ? `<div class="item-qtd" data-qtd="${n}">${n} unidade${n > 1 ? 's' : ''}</div>` : ''}
            </div>
            <button class="btn-del" onclick="removerItem(this)" title="Remover">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
        `;
        listaUl.prepend(li);
        atualizarContador();
    }

    // ── Contador & save ────────────────────────────────────
    function atualizarContador() {
        const total = listaUl.querySelectorAll('li:not(.empty)').length;
        badgeCount.textContent = total;
        badgeCount.classList.add('bump');
        setTimeout(() => badgeCount.classList.remove('bump'), 300);
        if (total === 0) {
            emptyState.style.display = '';
            subtitulo.textContent = 'Adicione os itens abaixo';
        } else {
            emptyState.style.display = 'none';
            const comp = listaUl.querySelectorAll('li.comprado').length;
            subtitulo.textContent = comp > 0
                ? `${comp} de ${total} item${total > 1 ? 's' : ''} comprado${comp > 1 ? 's' : ''}`
                : `${total} item${total > 1 ? 's' : ''} na lista`;
        }
        salvarLista();
    }

    // ── Ações ──────────────────────────────────────────────
    function adicionarItem() {
        const nome = produtoInput.value.trim();
        if (!nome) {
            produtoInput.focus();
            produtoInput.style.borderColor = '#e74c3c';
            setTimeout(() => produtoInput.style.borderColor = '', 800);
            return;
        }
        criarLi(nome, qtdInput.value || null, false);
        produtoInput.value = '';
        qtdInput.value = '';
        produtoInput.focus();
    }

    function toggleComprado(btn) {
        btn.closest('li').classList.toggle('comprado');
        atualizarContador();
    }

    function removerItem(btn) {
        const li = btn.closest('li');
        li.classList.add('removing');
        setTimeout(() => { li.remove(); atualizarContador(); }, 250);
    }

    function limparComprados() {
        listaUl.querySelectorAll('li.comprado').forEach(li => {
            li.classList.add('removing');
            setTimeout(() => { li.remove(); atualizarContador(); }, 250);
        });
    }

    [produtoInput, qtdInput].forEach(el =>
        el.addEventListener('keypress', e => { if (e.key === 'Enter') adicionarItem(); })
    );

    // ── Offline/Online ─────────────────────────────────────
    window.addEventListener('online',  () => mostrarToast('✅ Conexão restaurada'));
    window.addEventListener('offline', () => mostrarToast('📶 Offline — app continua funcionando!', 4500));

    // ── Service Worker ─────────────────────────────────────
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
            .catch(err => console.warn('[SW]', err));
    }

    // ── Prompt de instalação (Android/Chrome) ──────────────
    let deferredPrompt = null;
    const banner  = document.getElementById('installBanner');
    const btnInst = document.getElementById('btnInstall');
    const btnDism = document.getElementById('btnDismiss');

    window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredPrompt = e;
        banner.classList.add('visible');
    });

    btnInst.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        banner.classList.remove('visible');
        if (outcome === 'accepted') mostrarToast('🎉 App instalado!');
    });

    btnDism.addEventListener('click', () => banner.classList.remove('visible'));
    window.addEventListener('appinstalled', () => {
        banner.classList.remove('visible');
        mostrarToast('🎉 Instalado com sucesso!');
    });

    // ── Ícone gerado via Canvas (sem depender de arquivos PNG) ─
    function gerarIconePNG(size) {
        const c = document.createElement('canvas');
        c.width = c.height = size;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#2d6a4f';
        ctx.beginPath();
        ctx.roundRect(0, 0, size, size, size * 0.22);
        ctx.fill();
        ctx.font = `${Math.round(size * 0.54)}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🛒', size / 2, size / 2 + size * 0.03);
        return c.toDataURL('image/png');
    }
    document.getElementById('appleIcon').href = gerarIconePNG(180);

    // ── Carregar dados salvos ──────────────────────────────
    carregarLista();
</script>
</body>
</html>
