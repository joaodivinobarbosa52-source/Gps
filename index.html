<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lista de Compras</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2d6a4f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Compras">
    <link rel="apple-touch-icon" id="appleIcon" href="">

    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fdf6ec;
            --paper: #fffef9;
            --green: #2d6a4f;
            --green-light: #52b788;
            --green-pale: #d8f3dc;
            --orange: #e76f51;
            --ink: #1a1a2e;
            --muted: #8a8a9a;
            --border: #e8e2d5;
            --shadow: 0 4px 24px rgba(45,106,79,0.10);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--cream);
            min-height: 100dvh;
            font-family: 'DM Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding: max(env(safe-area-inset-top,24px),24px) 16px max(env(safe-area-inset-bottom,40px),40px);
        }
        body::before {
            content:''; position:fixed; top:-120px; right:-120px;
            width:400px; height:400px;
            background:radial-gradient(circle,#d8f3dc 0%,transparent 70%);
            pointer-events:none; z-index:0;
        }
        body::after {
            content:''; position:fixed; bottom:-100px; left:-80px;
            width:300px; height:300px;
            background:radial-gradient(circle,#fde8d8 0%,transparent 70%);
            pointer-events:none; z-index:0;
        }

        /* ── Banner instalação ── */
        #installBanner {
            display:none; width:100%; max-width:480px;
            background:var(--green); color:white;
            border-radius:16px; padding:14px 18px;
            margin-bottom:14px; align-items:center; gap:12px;
            position:relative; z-index:10;
            animation:slideIn .4s cubic-bezier(.34,1.3,.64,1) both;
        }
        #installBanner.visible{display:flex;}
        #installBanner .banner-icon{font-size:1.6rem;flex-shrink:0;}
        #installBanner .banner-text{flex:1;}
        #installBanner .banner-text strong{display:block;font-size:.95rem;}
        #installBanner .banner-text span{font-size:.78rem;opacity:.85;}
        #installBanner .btn-install{
            background:white;color:var(--green);border:none;
            padding:8px 16px;border-radius:10px;font-family:'DM Sans',sans-serif;
            font-weight:700;font-size:.85rem;cursor:pointer;flex-shrink:0;
        }
        #installBanner .btn-dismiss{
            background:none;border:none;color:white;font-size:1.2rem;
            cursor:pointer;opacity:.7;flex-shrink:0;padding:0 2px;
        }

        /* ── Container ── */
        .container{
            background:var(--paper);width:100%;max-width:480px;
            border-radius:24px;
            box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,.9) inset;
            padding:32px 28px 36px;position:relative;z-index:1;
            border:1px solid var(--border);
        }

        .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;}
        .header-text h1{
            font-family:'Fraunces',serif;font-size:2rem;
            font-weight:900;color:var(--ink);line-height:1.1;
        }
        .header-text h1 span{color:var(--green);}
        .header-text p{color:var(--muted);font-size:.85rem;margin-top:4px;}
        .badge-count{
            background:var(--green);color:white;
            font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;
            width:48px;height:48px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;flex-shrink:0;
            transition:transform .2s cubic-bezier(.34,1.56,.64,1);
        }
        .badge-count.bump{transform:scale(1.25);}

        .divider{height:1px;background:linear-gradient(90deg,var(--green-pale),transparent);margin:0 0 24px;}

        /* ── Formulário ── */
        .form-label{
            font-size:.72rem;font-weight:600;text-transform:uppercase;
            letter-spacing:.07em;color:var(--muted);display:block;margin-bottom:5px;
        }

        /* Seletor de categoria */
        .cat-tabs{
            display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;
        }
        .cat-tab{
            background:var(--cream);border:1.5px solid var(--border);
            border-radius:20px;padding:5px 12px;font-size:.78rem;font-weight:600;
            color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;
            font-family:'DM Sans',sans-serif;
        }
        .cat-tab.active{
            background:var(--green);border-color:var(--green);color:white;
        }

        /* Select de produto */
        .select-wrap{position:relative;margin-bottom:12px;}
        .select-wrap select{
            width:100%;padding:13px 40px 13px 14px;
            border:2px solid var(--border);border-radius:12px;
            font-size:.97rem;font-family:'DM Sans',sans-serif;
            background:var(--cream);color:var(--ink);
            outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;
            transition:border-color .2s,box-shadow .2s;
        }
        .select-wrap select:focus{
            border-color:var(--green-light);background:white;
            box-shadow:0 0 0 4px rgba(82,183,136,.12);
        }
        .select-wrap select option[value=""]{color:var(--muted);}
        .select-arrow{
            position:absolute;right:14px;top:50%;transform:translateY(-50%);
            pointer-events:none;color:var(--muted);
        }

        /* Qtd + botão */
        .form-row{display:flex;gap:10px;margin-bottom:0;}
        .input-wrap{position:relative;flex:1;}
        input[type="number"]{
            width:100%;padding:13px 14px;
            border:2px solid var(--border);border-radius:12px;
            font-size:.95rem;font-family:'DM Sans',sans-serif;
            background:var(--cream);color:var(--ink);
            outline:none;text-align:center;
            transition:border-color .2s,box-shadow .2s;
        }
        input[type="number"]:focus{
            border-color:var(--green-light);background:white;
            box-shadow:0 0 0 4px rgba(82,183,136,.12);
        }

        .btn-add{
            flex:1;background:var(--green);color:white;border:none;
            padding:15px;border-radius:14px;
            font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;
            cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
            transition:background .2s,transform .15s;
        }
        .btn-add:hover{background:#245c43;}
        .btn-add:active{transform:scale(.97);}

        /* ── Lista ── */
        .list-header{
            display:flex;align-items:center;gap:10px;margin:24px 0 14px;
        }
        .list-header span{
            font-size:.72rem;font-weight:600;text-transform:uppercase;
            letter-spacing:.08em;color:var(--muted);white-space:nowrap;
        }
        .list-header::before,.list-header::after{content:'';flex:1;height:1px;background:var(--border);}

        ul{list-style:none;}
        li{
            background:white;border:1.5px solid var(--border);
            margin-bottom:8px;padding:14px 14px 14px 16px;
            border-radius:14px;display:flex;align-items:center;gap:12px;
            animation:slideIn .3s cubic-bezier(.34,1.3,.64,1) both;
            transition:opacity .25s,transform .25s;
        }
        @keyframes slideIn{
            from{opacity:0;transform:translateY(-10px) scale(.97);}
            to{opacity:1;transform:translateY(0) scale(1);}
        }
        li.removing{opacity:0;transform:scale(.93) translateX(20px);}

        .check-btn{
            width:26px;height:26px;border-radius:50%;
            border:2px solid var(--green-light);background:transparent;
            cursor:pointer;flex-shrink:0;
            display:flex;align-items:center;justify-content:center;
            transition:background .2s,border-color .2s;padding:0;
        }
        .check-btn svg{display:none;}
        .comprado .check-btn{background:var(--green-light);border-color:var(--green-light);}
        .comprado .check-btn svg{display:block;}

        .item-info{flex:1;cursor:pointer;min-width:0;}
        .item-cat{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--green-light);margin-bottom:2px;}
        .item-nome{font-size:.97rem;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .item-qtd{font-size:.78rem;color:var(--green);font-weight:600;margin-top:2px;}

        .comprado .item-nome{text-decoration:line-through;color:var(--muted);}
        .comprado .item-cat,.comprado .item-qtd{color:var(--muted);}
        .comprado{opacity:.65;}

        .btn-del{
            background:transparent;border:none;color:var(--muted);
            cursor:pointer;padding:6px;border-radius:8px;flex-shrink:0;
            display:flex;align-items:center;justify-content:center;
            transition:background .15s,color .15s;
        }
        .btn-del:hover{background:#fde8e4;color:var(--orange);}

        .empty{text-align:center;padding:32px 0 16px;color:var(--muted);}
        .empty-icon{font-size:2.5rem;margin-bottom:8px;}
        .empty p{font-size:.9rem;}

        .footer-actions{margin-top:20px;display:flex;justify-content:flex-end;}
        .btn-clear{
            background:none;border:none;font-family:'DM Sans',sans-serif;
            font-size:.8rem;color:var(--muted);cursor:pointer;
            padding:4px 8px;border-radius:6px;transition:color .15s,background .15s;
        }
        .btn-clear:hover{color:var(--orange);background:#fde8e4;}

        /* ── Toast ── */
        #toast{
            position:fixed;bottom:28px;left:50%;
            transform:translateX(-50%) translateY(80px);
            background:var(--ink);color:white;
            padding:10px 22px;border-radius:50px;
            font-size:.85rem;font-weight:500;z-index:100;white-space:nowrap;
            transition:transform .35s cubic-bezier(.34,1.3,.64,1);pointer-events:none;
        }
        #toast.show{transform:translateX(-50%) translateY(0);}
    </style>
</head>
<body>

<div id="installBanner">
    <div class="banner-icon">📲</div>
    <div class="banner-text">
        <strong>Instalar como aplicativo</strong>
        <span>Funciona offline, como app nativo</span>
    </div>
    <button class="btn-install" id="btnInstall">Instalar</button>
    <button class="btn-dismiss" id="btnDismiss">✕</button>
</div>

<div class="container">
    <div class="header">
        <div class="header-text">
            <h1>Lista de<br><span>Compras</span></h1>
            <p id="subtitulo">Adicione os itens abaixo</p>
        </div>
        <div class="badge-count" id="badgeCount">0</div>
    </div>

    <div class="divider"></div>

    <!-- Abas de categoria -->
    <span class="form-label">Categoria</span>
    <div class="cat-tabs" id="catTabs"></div>

    <!-- Select de produto -->
    <div class="select-wrap">
        <select id="produtoSelect">
            <option value="">— Escolha o produto —</option>
        </select>
        <span class="select-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
    </div>

    <!-- Qtd + Adicionar -->
    <div class="form-row">
        <div class="input-wrap" style="max-width:100px;">
            <input type="number" id="qtdInput" placeholder="Qtd" min="1">
        </div>
        <button class="btn-add" onclick="adicionarItem()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Adicionar à lista
        </button>
    </div>

    <div class="list-header"><span>Itens</span></div>

    <ul id="listaUl">
        <li class="empty" id="emptyState">
            <div class="empty-icon">🛒</div>
            <p>Sua lista está vazia.<br>Escolha uma categoria e adicione!</p>
        </li>
    </ul>

    <div class="footer-actions">
        <button class="btn-clear" onclick="limparComprados()">Remover comprados</button>
    </div>
</div>

<div id="toast"></div>

// ── DOM ───────────────────────────────────────────────────────────────────────
const catTabs      = document.getElementById('catTabs');
const produtoSelect = document.getElementById('produtoSelect');
const qtdInput     = document.getElementById('qtdInput');
const listaUl      = document.getElementById('listaUl');
const badgeCount   = document.getElementById('badgeCount');
const emptyState   = document.getElementById('emptyState');
const subtitulo    = document.getElementById('subtitulo');
const toastEl      = document.getElementById('toast');

let catAtiva = Object.keys(CATEGORIAS)[0];

// ── Renderizar abas ───────────────────────────────────────────────────────────
function renderTabs() {
    catTabs.innerHTML = '';
    Object.keys(CATEGORIAS).forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-tab' + (cat === catAtiva ? ' active' : '');
        btn.textContent = cat;
        btn.onclick = () => { catAtiva = cat; renderTabs(); renderSelect(); };
        catTabs.appendChild(btn);
    });
}

// ── Renderizar select ─────────────────────────────────────────────────────────
function renderSelect() {
    produtoSelect.innerHTML = '<option value="">— Escolha o produto —</option>';
    CATEGORIAS[catAtiva].sort().forEach(prod => {
        const opt = document.createElement('option');
        opt.value = prod;
        opt.textContent = prod;
        produtoSelect.appendChild(opt);
    });
    produtoSelect.value = '';
}

renderTabs();
renderSelect();

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function mostrarToast(msg, dur = 3000) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), dur);
}

// ── LocalStorage ──────────────────────────────────────────────────────────────
const LS_KEY = 'lista_compras_v2';

function salvarLista() {
    const itens = [];
    listaUl.querySelectorAll('li:not(.empty)').forEach(li => {
        const qtdEl = li.querySelector('.item-qtd');
        itens.push({
            cat:      li.querySelector('.item-cat')?.textContent || '',
            nome:     li.querySelector('.item-nome').textContent,
            qtd:      qtdEl ? qtdEl.dataset.qtd : null,
            comprado: li.classList.contains('comprado')
        });
    });
    localStorage.setItem(LS_KEY, JSON.stringify(itens));
}

function carregarLista() {
    try {
        const salvo = localStorage.getItem(LS_KEY);
        if (!salvo) return;
        JSON.parse(salvo).reverse().forEach(i => criarLi(i.cat, i.nome, i.qtd, i.comprado));
    } catch(e) { localStorage.removeItem(LS_KEY); }
}

// ── Criar item ────────────────────────────────────────────────────────────────
function criarLi(cat, nome, qtd, comprado = false) {
    const li = document.createElement('li');
    if (comprado) li.classList.add('comprado');
    const n = qtd ? parseInt(qtd) : null;
    // Extrai só o emoji + nome curto da categoria (remove emoji do início para label)
    const catLabel = cat.replace(/^[\u{1F300}-\u{1FFFF}\u2600-\u27BF]\s*/u, '');
    li.innerHTML = `
        <button class="check-btn" onclick="toggleComprado(this)" title="Marcar como comprado">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <div class="item-info" onclick="toggleComprado(this.previousElementSibling)">
            <div class="item-cat">${catLabel}</div>
            <div class="item-nome">${nome}</div>
            ${n ? `<div class="item-qtd" data-qtd="${n}">${n} unidade${n > 1 ? 's' : ''}</div>` : ''}
        </div>
        <button class="btn-del" onclick="removerItem(this)" title="Remover">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
    `;
    listaUl.prepend(li);
    atualizarContador();
}

// ── Contador ──────────────────────────────────────────────────────────────────
function atualizarContador() {
    const total = listaUl.querySelectorAll('li:not(.empty)').length;
    badgeCount.textContent = total;
    badgeCount.classList.add('bump');
    setTimeout(() => badgeCount.classList.remove('bump'), 300);
    if (total === 0) {
        emptyState.style.display = '';
        subtitulo.textContent = 'Adicione os itens abaixo';
    } else {
        emptyState.style.display = 'none';
        const comp = listaUl.querySelectorAll('li.comprado').length;
        subtitulo.textContent = comp > 0
            ? `${comp} de ${total} item${total > 1 ? 's' : ''} comprado${comp > 1 ? 's' : ''}`
            : `${total} item${total > 1 ? 's' : ''} na lista`;
    }
    salvarLista();
}

// ── Ações ─────────────────────────────────────────────────────────────────────
function adicionarItem() {
    const nome = produtoSelect.value;
    if (!nome) {
        produtoSelect.style.borderColor = '#e74c3c';
        setTimeout(() => produtoSelect.style.borderColor = '', 800);
        mostrarToast('⚠️ Escolha um produto primeiro');
        return;
    }
    criarLi(catAtiva, nome, qtdInput.value || null, false);
    produtoSelect.value = '';
    qtdInput.value = '';
}

function toggleComprado(btn) {
    btn.closest('li').classList.toggle('comprado');
    atualizarContador();
}

function removerItem(btn) {
    const li = btn.closest('li');
    li.classList.add('removing');
    setTimeout(() => { li.remove(); atualizarContador(); }, 250);
}

function limparComprados() {
    listaUl.querySelectorAll('li.comprado').forEach(li => {
        li.classList.add('removing');
        setTimeout(() => { li.remove(); atualizarContador(); }, 250);
    });
}

qtdInput.addEventListener('keypress', e => { if (e.key === 'Enter') adicionarItem(); });

// ── Offline / Online ──────────────────────────────────────────────────────────
window.addEventListener('online',  () => mostrarToast('✅ Conexão restaurada'));
window.addEventListener('offline', () => mostrarToast('📶 Offline — app continua funcionando!', 4500));

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn('[SW]', e));
}

// ── Banner de instalação ──────────────────────────────────────────────────────
let deferredPrompt = null;
const banner  = document.getElementById('installBanner');
const btnInst = document.getElementById('btnInstall');
const btnDism = document.getElementById('btnDismiss');

window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e; banner.classList.add('visible');
});
btnInst.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null; banner.classList.remove('visible');
    if (outcome === 'accepted') mostrarToast('🎉 App instalado!');
});
btnDism.addEventListener('click', () => banner.classList.remove('visible'));
window.addEventListener('appinstalled', () => {
    banner.classList.remove('visible'); mostrarToast('🎉 Instalado com sucesso!');
});

// ── Ícone via Canvas ──────────────────────────────────────────────────────────
function gerarIconePNG(size) {
    const c = document.createElement('canvas'); c.width = c.height = size;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#2d6a4f';
    ctx.beginPath(); ctx.roundRect(0,0,size,size,size*.22); ctx.fill();
    ctx.font = `${Math.round(size*.54)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🛒', size/2, size/2 + size*.03);
    return c.toDataURL('image/png');
}
document.getElementById('appleIcon').href = gerarIconePNG(180);

// ── Carregar lista salva ──────────────────────────────────────────────────────
carregarLista();
</script>
</body>
