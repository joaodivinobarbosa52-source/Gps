<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Área Fácil Pro - GPS Ativo</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #1a2a1f; overflow: hidden; }
        
        .header { background: #1b5e20; padding: 10px; display: flex; gap: 8px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .header input { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 14px; outline: none; }
        
        #map { flex: 1; width: 100%; }

        .painel { background: white; padding: 15px; border-top: 4px solid #2e7d32; z-index: 1000; }
        .info { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1.1rem; font-weight: bold; color: #1b5e20; background: #e8f5e9; padding: 10px; border-radius: 10px; }
        
        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; background: #2c3e2b; }
        button:active { transform: scale(0.96); }
        
        .btn-pdf { background: #37474f; grid-column: span 2; }
        .btn-kml { background: #0b5e9e; }
        .btn-csv { background: #2e7d32; }
        .btn-limpar { background: #b71c1c; grid-column: span 2; margin-top: 5px; font-size: 12px; }

        /* Estilo dos Botões do Mapa */
        .leaflet-bar a { background: white; width: 44px !important; height: 44px !important; line-height: 44px !important; font-size: 22px !important; text-align: center; display: block; }
        .recording { background: #ffcdd2 !important; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="fazenda" placeholder="Nome da Fazenda">
    <input type="text" id="safra" placeholder="Safra (ex: 25/26)">
</div>

<div id="map"></div>

<div class="painel">
    <div class="info">
        <span id="txtArea">0.00 ha</span>
        <span id="txtTalhoes">0 Talhões</span>
    </div>
    <div class="grid-botoes">
        <button onclick="gerarPDF()" class="btn-pdf">📋 Gerar Relatório PDF</button>
        <button onclick="exportarKML()" class="btn-kml">🌍 Google Earth</button>
        <button onclick="exportarCSV()" class="btn-csv">📊 Planilha CSV</button>
        <button onclick="limparMapa()" class="btn-limpar">Apagar Tudo</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script>
    // Configuração do Mapa
    const map = L.map('map').setView([-15.78, -47.92], 4);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19, attribution: 'Esri & Maxar'
    }).addTo(map);

    const drawnItems = new L.FeatureGroup().addTo(map);
    let watchID = null;
    let pontosCaminhados = [];
    let linhaTemp = L.polyline([], {color: '#2196F3', weight: 4, dashArray: '5, 10'}).addTo(map);

    // Controle de Desenho Manual
    const drawControl = new L.Control.Draw({
        draw: { polygon: { allowIntersection: false, shapeOptions: { color: '#2e7d32' } }, 
        polyline: false, circle: false, rectangle: false, marker: false, circlemarker: false },
        edit: { featureGroup: drawnItems }
    });
    map.addControl(drawControl);

    // --- FUNÇÕES DE GPS E RASTREAMENTO ---

    // Botão "Medir Andando"
    const RecordControl = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function() {
            const container = L.DomUtil.create('div', 'leaflet-bar');
            const btn = L.DomUtil.create('a', '', container);
            btn.innerHTML = '▶️';
            btn.href = '#';
            btn.title = "Caminhar Perímetro";
            
            btn.onclick = (e) => {
                e.preventDefault();
                if (!watchID) {
                    btn.innerHTML = '⏹️';
                    btn.classList.add('recording');
                    iniciarRastreamento();
                } else {
                    btn.innerHTML = '▶️';
                    btn.classList.remove('recording');
                    pararRastreamento();
                }
            };
            return container;
        }
    });
    map.addControl(new RecordControl());

    // Botão "Minha Localização"
    const GpsBtn = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function() {
            const container = L.DomUtil.create('div', 'leaflet-bar');
            const btn = L.DomUtil.create('a', '', container);
            btn.innerHTML = '📍';
            btn.href = '#';
            btn.onclick = (e) => { e.preventDefault(); map.locate({setView: true, maxZoom: 17}); };
            return container;
        }
    });
    map.addControl(new GpsBtn());

    function iniciarRastreamento() {
        pontosCaminhados = [];
        linhaTemp.setLatLngs([]);
        
        watchID = navigator.geolocation.watchPosition(
            (pos) => {
                const latlng = [pos.coords.latitude, pos.coords.longitude];
                if (pos.coords.accuracy < 30) { // Filtro de precisão < 30m
                    pontosCaminhados.push(latlng);
                    linhaTemp.setLatLngs(pontosCaminhados);
                    map.panTo(latlng);
                }
            },
            (err) => alert("Erro no GPS: " + err.message),
            { enableHighAccuracy: true }
        );
    }

    function pararRastreamento() {
        navigator.geolocation.clearWatch(watchID);
        watchID = null;

        if (pontosCaminhados.length > 2) {
            const nome = prompt("Nome do Talhão (GPS):", "Talhão " + (drawnItems.getLayers().length + 1));
            const poly = L.polygon(pontosCaminhados, { color: '#2e7d32', weight: 3 }).addTo(drawnItems);
            poly.options.nome = nome || "Talhão GPS";
            atualizarTotais();
        }
        linhaTemp.setLatLngs([]);
    }

    // --- LÓGICA DE CÁLCULO E EXPORTAÇÃO ---

    function atualizarTotais() {
        let areaTotal = 0;
        drawnItems.eachLayer(layer => {
            const areaHa = turf.area(layer.toGeoJSON()) / 10000;
            areaTotal += areaHa;
            layer.bindTooltip(`<b>${layer.options.nome || "Talhão"}</b><br>${areaHa.toFixed(2)} ha`, {permanent: true, direction: 'center'}).openTooltip();
        });
        document.getElementById('txtArea').innerText = areaTotal.toFixed(2) + " ha";
        document.getElementById('txtTalhoes').innerText = drawnItems.getLayers().length + " Talhão(ões)";
    }

    map.on('draw:created', (e) => {
        const nome = prompt("Nome do Talhão:");
        e.layer.options.nome = nome || "Talhão";
        drawnItems.addLayer(e.layer);
        atualizarTotais();
    });

    window.exportarCSV = function() {
        let csv = "Talhao;Area_ha\n";
        drawnItems.eachLayer(l => {
            const a = turf.area(l.toGeoJSON()) / 10000;
            csv += `${l.options.nome};${a.toFixed(2)}\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'áreas.csv'; a.click();
    };

    window.exportarKML = function() {
        let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>`;
        drawnItems.eachLayer(l => {
            const coords = l.getLatLngs()[0].map(p => `${p.lng},${p.lat},0`).join(" ");
            kml += `<Placemark><name>${l.options.nome}</name><Polygon><outerBoundaryIs><LinearRing><coordinates>${coords}</coordinates></LinearRing></outerBoundaryIs></Polygon></Placemark>`;
        });
        kml += `</Document></kml>`;
        const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'mapa.kml'; a.click();
    };

    window.gerarPDF = function() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const f = document.getElementById('fazenda').value || "Fazenda";
        doc.setFontSize(18); doc.text(`Relatório de Áreas - ${f}`, 14, 20);
        const rows = [];
        drawnItems.eachLayer(l => rows.push([l.options.nome, (turf.area(l.toGeoJSON())/10000).toFixed(2) + " ha"]));
        doc.autoTable({ head: [['Talhão', 'Área']], body: rows, startY: 30 });
        doc.save(`${f}.pdf`);
    };

    window.limparMapa = function() {
        if(confirm("Deseja apagar todos os desenhos?")) {
            drawnItems.clearLayers();
            atualizarTotais();
        }
    };
</script>
</body>
</html>
